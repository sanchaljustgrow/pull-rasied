name: Deploy to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Build Maven project
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # Copy JAR to EC2 (rename explicitly to app.jar)
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: ${{ secrets.EC2_PORT }}
          source: "target/demo-0.0.1-SNAPSHOT.jar"
          target: "/home/ubuntu/"
          overwrite: true

      # Rename JAR on EC2 to app.jar
      - name: Rename JAR on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            mv /home/ubuntu/demo-0.0.1-SNAPSHOT.jar /home/ubuntu/app.jar

      # Deploy on EC2
      - name: Deploy on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: ${{ secrets.EC2_PORT }}
          timeout: 30s
          command_timeout: 10m
          script: |
            echo "Stopping existing application..."
            pkill -f 'java -jar /home/ubuntu/app.jar' || true

            echo "Starting application..."
            nohup java -jar /home/ubuntu/app.jar > /home/ubuntu/app.log 2>&1 &

            echo "Deployment completed successfully"

      # Health check
      - name: Verify application is running
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            curl -s http://localhost:8080/ || echo "App not responding yet"
